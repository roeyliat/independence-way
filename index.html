<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>הדרך לעצמאות</title><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff8ef;--card:#fff;--ink:#2f2a24;--green:#43a047;--blue:#2f6fed;--gold:#d18f00;--shadow:0 12px 28px rgba(58,41,24,.10)}
*{box-sizing:border-box}body{margin:0;font-family:Heebo,sans-serif;background:linear-gradient(180deg,#eefaff 0%,#fff8ee 45%,#fdf5e8 100%);color:var(--ink)}
.top{padding:28px 16px;background:linear-gradient(180deg,#cceeff 0%,#dff6ff 55%,#85d48d 55%,#57b164 100%)}.hero{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:20px;align-items:center}
h1{font-size:clamp(38px,6vw,70px);line-height:1;margin:10px 0}.sub{background:#ffffffd6;border-radius:18px;padding:12px 16px;box-shadow:var(--shadow);font-size:18px;line-height:1.6}
.panel{background:#ffffffde;border-radius:24px;padding:16px;box-shadow:var(--shadow)} .wallet{display:flex;justify-content:space-between;align-items:center}.wallet .val{font-size:40px;font-weight:900;color:#1c8b43}
.wrap{max-width:1100px;margin:0 auto;padding:0 16px 32px}.classbox{margin-top:-18px;background:#fff;border-radius:24px;padding:16px;box-shadow:var(--shadow)}.bar{height:14px;background:#edf3ee;border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;background:linear-gradient(90deg,#43a047,#2f6fed);width:0%}
.stages{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:22px}.card{background:#fff;border-radius:24px;overflow:hidden;box-shadow:var(--shadow)}.head{padding:16px;display:flex;gap:12px;align-items:center}.icon{font-size:34px}.body{padding:0 16px 16px}.body p{background:#fff8ef;border-right:5px solid #f0c68b;border-radius:14px;padding:10px 12px;min-height:72px}.actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:8px}.btn{display:inline-block;text-decoration:none;border:none;border-radius:14px;padding:12px 14px;font:inherit;font-weight:900;cursor:pointer}.primary{background:var(--green);color:#fff}.secondary{background:#fff;border:2px solid #ecd89a;color:#6b5528}
.studentbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}.studentbar select,.studentbar input{border:2px solid #eadfce;border-radius:12px;padding:10px 12px;font:inherit}
footer{text-align:center;padding:22px;font-size:12px;color:#6f6458}
@media(max-width:900px){.hero{grid-template-columns:1fr}.stages{grid-template-columns:1fr}}
</style></head><body>
<section class="top"><div class="hero"><div><div style="background:#ffffffc8;display:inline-block;padding:8px 14px;border-radius:999px;font-weight:900">🌱 ריפוי בעיסוק · כישורי חיים</div><h1>הדרך לעצמאות</h1><div class="sub">משחק רשת תפקודי, נעים וברור לילדים. המטרה היא עצמאות בקנייה, סריקה חזותית, רצף פעולה, בקרה עצמית והשתתפות יומיומית.</div></div><div class="panel"><div class="wallet"><div><small>הארנק של התלמיד</small><div class="val">₪<span id="walletVal">0</span></div></div><button class="secondary" onclick="speakInstruction('בחר משחק כדי להתחיל')">🔊 הקרא</button></div><div class="studentbar"><select id="studentSelect"></select><button class="secondary" onclick="addStudent()">➕ הוסף תלמיד</button><button class="secondary" onclick="continueLast()">▶ המשך מהמקום האחרון</button></div></div></div></section>
<div class="wrap">
  <div class="classbox"><strong>🏆 התקדמות כיתתית לפרס</strong><div class="bar"><div class="fill" id="classFill"></div></div><div id="classText" style="margin-top:8px;font-weight:800"></div></div>
  <div class="stages" id="stages"></div>
</div>
<footer>כל הזכויות שמורות ללי-את רטנר 2026 ©</footer>
<script src="wallet.js"></script><script src="student-progress.js"></script><script src="accessibility-audio.js"></script><script>
const stages=[
 {key:'lemon-sequence',icon:'🍋',title:'רצף לימונדה',desc:'מסדרים שלבים לפי סדר נכון ומתחילים תהליך.',file:'lemonade_sequence_game.html'},
 {key:'lemon-ninja',icon:'🍋',title:'לימון נינג׳ה',desc:'מוטוריקה, קואורדינציה ותגובה.',file:'lemon-ninja.html'},
 {key:'coin-recognition',icon:'🪙',title:'זיהוי מטבעות',desc:'מזהים כסף אמיתי בעזרת תמונות.',file:'coin-recognition.html'},
 {key:'banknote-recognition',icon:'💵',title:'זיהוי שטרות',desc:'מזהים שטרות לפני ערבוב של כסף.',file:'banknote-recognition.html'},
 {key:'money-mix',icon:'💰',title:'כסף מעורבב',desc:'מזהים יחד מטבעות ושטרות.',file:'money-mix-recognition.html'},
 {key:'build-amount',icon:'🧩',title:'בונים סכום',desc:'בוחרים כסף מתאים בתוך סיטואציה.',file:'build-amount.html'},
 {key:'find-cheapest',icon:'🔍',title:'חיפוש במדף',desc:'סריקה חזותית, קשב ובחירה.',file:'stage2-find-cheapest.html'},
 {key:'price-compare',icon:'🏷️',title:'השוואת מחירים',desc:'בודקים את כל האפשרויות לפני בחירה.',file:'price-comparison-game.html'},
 {key:'shopping-list',icon:'🛒',title:'קנייה לפי רשימה',desc:'שומרים מטרה לאורך כמה צעדים.',file:'shopping-game-stage2.html'},
 {key:'checkout',icon:'🧾',title:'קופה ועודף',desc:'בחירת כסף מתאים, תשלום וסיום קנייה.',file:'checkout-stage.html'},
 {key:'recycling',icon:'♻️',title:'מחזור',desc:'מוטוריקה, סריקה וסיום משימה.',file:'recycling-game.html'}
];
function renderStudents(){
  const sel=document.getElementById('studentSelect'); sel.innerHTML='';
  AppState.students().forEach(name=>{ const o=document.createElement('option'); o.value=name; o.textContent=name; if(name===AppState.active()) o.selected=true; sel.appendChild(o); });
  sel.onchange=()=>{ AppState.setActive(sel.value); renderAll(); };
}
function addStudent(){ const name=prompt('שם תלמיד חדש'); if(name){ AppState.addStudent(name); renderAll(); } }
function continueLast(){ const s=Progress.getStudent(); location.href=s.lastPage || 'lemonade_sequence_game.html'; }
function renderClass(){ const pts=AppState.classPoints(); const goal=AppState.classGoal(); classFill.style.width=Math.min(100,Math.round(pts/goal*100))+'%'; classText.textContent=pts+' / '+goal+' נקודות כיתתיות'; }
function renderStages(){
  const box=document.getElementById('stages'); box.innerHTML=''; const prog=Progress.getStudent();
  stages.forEach(s=>{ const done=!!prog.steps[s.key]; const el=document.createElement('div'); el.className='card'; el.innerHTML='<div class="head"><div class="icon">'+s.icon+'</div><div><div style="font-weight:900;font-size:24px">'+s.title+'</div><div style="color:#6f6458;font-weight:700">'+(done?'הושלם ✔':'עדיין לא הושלם')+'</div></div></div><div class="body"><p>'+s.desc+'</p><div class="actions"><a class="btn primary" href="'+s.file+'" onclick="Progress.setLast(\''+s.file+'\')">פתח משחק</a><span style="font-weight:900;color:'+(done?'#1c8b43':'#9a8d7d')+'">'+(done?'✔':'')+'</span></div></div>'; box.appendChild(el); });
}
function renderAll(){ walletVal.textContent=AppState.wallet(); renderStudents(); renderClass(); renderStages(); }
renderAll(); speakInstruction('ברוך הבא. בחר משחק כדי להתחיל');
</script></body></html>
