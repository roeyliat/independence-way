<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>זיהוי שטרות</title><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>body{margin:0;font-family:Heebo,sans-serif;background:#eef7ff}.wrap{max-width:900px;margin:0 auto;padding:16px}.panel{background:#fff;border-radius:24px;padding:18px;box-shadow:0 10px 24px rgba(0,0,0,.08)}.title{font-size:32px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:14px}.card{border:3px solid #d7e7f7;border-radius:20px;padding:10px;background:#f8fbff;cursor:pointer}.card img{width:100%;height:120px;object-fit:contain;background:white;border-radius:16px}.label{text-align:center;font-weight:900;margin-top:6px}.feedback{min-height:48px;text-align:center;font-size:22px;font-weight:900;margin-top:10px}.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}button{border:none;border-radius:16px;padding:12px 16px;font:inherit;font-weight:900;cursor:pointer}.primary{background:#43a047;color:#fff}.secondary{background:#fff;border:2px solid #d7e7f7}.footer{text-align:center;margin-top:14px;font-size:12px;color:#607b96}</style></head><body><div class="wrap"><div class="panel"><div class="title">💵 זיהוי שטרות</div><div id="instruction"></div><div class="grid" id="grid"></div><div class="feedback" id="feedback"></div><div class="controls"><button class="secondary" onclick="nextRound()">משימה חדשה</button><button class="primary" onclick="location.href='money-mix-recognition.html'">המשך</button><button class="secondary" onclick="location.href='index.html'">חזרה לשכונה</button></div></div><div class="footer">כל הזכויות שמורות ללי-את רטנר 2026 ©</div></div>
<script src="wallet.js"></script><script src="student-progress.js"></script><script src="accessibility-audio.js"></script><script>
const notes=[{value:20,label:'20 ₪',img:'https://commons.wikimedia.org/wiki/Special:FilePath/20%20Israeli%20new%20shekel%20in%202017%20Obverse.jpg'},{value:50,label:'50 ₪',img:'https://commons.wikimedia.org/wiki/Special:FilePath/50%20Israeli%20new%20shekel%20in%202013%20Obverse.jpg'},{value:100,label:'100 ₪',img:'https://commons.wikimedia.org/wiki/Special:FilePath/100%20Israeli%20new%20shekel%20in%202017%20Obverse.jpg'},{value:200,label:'200 ₪',img:'https://commons.wikimedia.org/wiki/Special:FilePath/200%20Israeli%20new%20shekel%20in%202015%20Obverse.jpg'}];
let target=null; function nextRound(){target=notes[Math.floor(Math.random()*notes.length)]; instruction.textContent='חפש את השטר של '+target.value+' שקלים'; feedback.textContent=''; speakInstruction(instruction.textContent); grid.innerHTML=''; [...notes].sort(()=>Math.random()-.5).forEach(item=>{ const b=document.createElement('button'); b.className='card'; b.innerHTML='<img src="'+item.img+'" alt="'+item.label+'"><div class="label">'+item.label+'</div>'; b.onclick=()=>{ if(item.value===target.value){ feedback.textContent='כל הכבוד!'; Progress.mark('banknote-recognition',10,'money-mix-recognition.html'); speakSuccess(); } else { feedback.textContent='בוא נבדוק שוב'; speakTryAgain(); } }; grid.appendChild(b); });} nextRound();</script></body></html>
